port 3306" data-shape="rectangle">
  <rect x="56" y="84" width="147.17200000000003" height="53.800000000000004" rx="0" ry="0" fill="var(--_node-fill)" stroke="var(--_node-stroke)" stroke-width="0.75" />
  <text x="129.586" y="110.9" text-anchor="middle" font-size="13" font-weight="500" fill="var(--_text)"><tspan x="129.586" dy="-3.9000000000000012">MySQL Container</tspan><tspan x="129.586" dy="16.900000000000002">port 3306</tspan></text>
</g>
</svg>
  <text x="129.442" y="195.95000000000002" text-anchor="middle" font-size="11" font-weight="400" fill="var(--_text-sec)" dy="3.8499999999999996">내부 네트워크</text>
</g>
<g class="node" data-id="APP" data-label="App Container
FastAPI" data-shape="rectangle">
  <rect x="66.7445" y="254.10000000000002" width="125.68300000000002" height="53.800000000000004" rx="0" ry="0" fill="var(--_node-fill)" stroke="var(--_node-stroke)" stroke-width="0.75" />
  <text x="129.586" y="281" text-anchor="middle" font-size="13" font-weight="500" fill="var(--_text)"><tspan x="129.586" dy="-3.9000000000000012">App Container</tspan><tspan x="129.586" dy="16.900000000000002">FastAPI</tspan></text>
</g>

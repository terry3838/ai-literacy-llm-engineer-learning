  <rect x="582.538" y="40" width="100.48899999999999" height="36.900000000000006" rx="0" ry="0" fill="var(--_node-fill)" stroke="var(--_node-stroke)" stroke-width="0.75" />
  <text x="632.7825" y="58.45" text-anchor="middle" font-size="13" font-weight="500" fill="var(--_text)" dy="4.55">SSH 접속</text>
</g>
<g class="node" data-id="E" data-label="환경 설정" data-shape="rectangle">
  <rect x="731.027" y="40" width="103.453" height="36.900000000000006" rx="0" ry="0" fill="var(--_node-fill)" stroke="var(--_node-stroke)" stroke-width="0.75" />
  <text x="782.7535" y="58.45" text-anchor="middle" font-size="13" font-weight="500" fill="var(--_text)" dy="4.55">환경 설정</text>
</g>
<g class="node" data-id="F" data-label="웹서버 실행" data-shape="rectangle">
  <rect x="882.48" y="40" width="118.273" height="36.900000000000006" rx="0" ry="0" fill="var(--_node-fill)" stroke="var(--_node-stroke)" stroke-width="0.75" />
  <text x="941.6165" y="58.45" text-anchor="middle" font-size="13" font-weight="500" fill="var(--_text)" dy="4.55">웹서버 실행</text>
</g>
<g class="node" data-id="G" data-label="서비스 공개" data-shape="rectangle">
  <rect x="1048.753" y="40" width="118.273" height="36.900000000000006" rx="0" ry="0" fill="var(--_node-fill)" stroke="var(--_node-stroke)" stroke-width="0.75" />
  <text x="1107.8895" y="58.45" text-anchor="middle" font-size="13" font-weight="500" fill="var(--_text)" dy="4.55">서비스 공개</text>

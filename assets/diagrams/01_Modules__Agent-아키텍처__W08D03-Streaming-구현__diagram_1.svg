<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 728.838 468" width="728.838" height="468" style="--bg:#ffffff;--fg:#1f2328;--line:#d1d9e0;--accent:#0969da;--muted:#59636e">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap');
  text { font-family: 'Inter', system-ui, sans-serif; }
  svg {
    /* Derived from --bg and --fg (overridable via --line, --accent, etc.) */
    --_text:          var(--fg);
    --_text-sec:      var(--muted, color-mix(in srgb, var(--fg) 60%, var(--bg)));
    --_text-muted:    var(--muted, color-mix(in srgb, var(--fg) 40%, var(--bg)));
    --_text-faint:    color-mix(in srgb, var(--fg) 25%, var(--bg));
    --_line:          var(--line, color-mix(in srgb, var(--fg) 50%, var(--bg)));
    --_arrow:         var(--accent, color-mix(in srgb, var(--fg) 85%, var(--bg)));
    --_node-fill:     var(--surface, color-mix(in srgb, var(--fg) 3%, var(--bg)));
    --_node-stroke:   var(--border, color-mix(in srgb, var(--fg) 20%, var(--bg)));
    --_group-fill:    var(--bg);
    --_group-hdr:     color-mix(in srgb, var(--fg) 5%, var(--bg));
    --_inner-stroke:  color-mix(in srgb, var(--fg) 12%, var(--bg));
    --_key-badge:     color-mix(in srgb, var(--fg) 10%, var(--bg));
  }
</style>
<defs>
  <marker id="seq-arrow" markerWidth="8" markerHeight="5" refX="8" refY="2.5" orient="auto-start-reverse">
    <polygon points="0 0, 8 2.5, 0 5" fill="var(--_arrow)" />
  </marker>
  <marker id="seq-arrow-open" markerWidth="8" markerHeight="5" refX="8" refY="2.5" orient="auto-start-reverse">
    <polyline points="0 0, 8 2.5, 0 5" fill="none" stroke="var(--_arrow)" stroke-width="1" />
  </marker>
</defs>
<g class="block" data-type="loop" data-label="토큰 단위">
  <rect x="30" y="238" width="668.838" height="180" rx="0" ry="0" fill="none" stroke="var(--_node-stroke)" stroke-width="1" />
  <rect x="30" y="238" width="103.45" height="18" fill="var(--_group-hdr)" stroke="var(--_node-stroke)" stroke-width="1" />
  <text x="36" y="247" font-size="11" font-weight="600" fill="var(--_text-sec)" dy="3.8499999999999996">loop [토큰 단위]</text>
</g>
<line class="lifeline" data-actor="User" x1="80" y1="70" x2="80" y2="438" stroke="var(--_line)" stroke-width="0.75" stroke-dasharray="6 4" />
<line class="lifeline" data-actor="UI" x1="220" y1="70" x2="220" y2="438" stroke="var(--_line)" stroke-width="0.75" stroke-dasharray="6 4" />
<line class="lifeline" data-actor="API" x1="360" y1="70" x2="360" y2="438" stroke="var(--_line)" stroke-width="0.75" stroke-dasharray="6 4" />
<line class="lifeline" data-actor="Graph" x1="500" y1="70" x2="500" y2="438" stroke="var(--_line)" stroke-width="0.75" stroke-dasharray="6 4" />
<line class="lifeline" data-actor="LLM" x1="640" y1="70" x2="640" y2="438" stroke="var(--_line)" stroke-width="0.75" stroke-dasharray="6 4" />
<g class="message" data-from="User" data-to="UI" data-label="메시지 입력" data-line-style="solid" data-arrow-head="filled" data-self="false">
  <line x1="80" y1="90" x2="220" y2="90" stroke="var(--_line)" stroke-width="1" marker-end="url(#seq-arrow)" />
  <text x="150" y="80" font-size="11" text-anchor="middle" font-weight="400" fill="var(--_text-muted)" dy="3.8499999999999996">메시지 입력</text>
</g>
<g class="message" data-from="UI" data-to="API" data-label="POST /chat (stream=true)" data-line-style="solid" data-arrow-head="filled" data-self="false">
  <line x1="220" y1="130" x2="360" y2="130" stroke="var(--_line)" stroke-width="1" marker-end="url(#seq-arrow)" />
  <text x="290" y="120" font-size="11" text-anchor="middle" font-weight="400" fill="var(--_text-muted)" dy="3.8499999999999996">POST /chat (stream=true)</text>
</g>
<g class="message" data-from="API" data-to="Graph" data-label="astream_events()" data-line-style="solid" data-arrow-head="filled" data-self="false">
  <line x1="360" y1="170" x2="500" y2="170" stroke="var(--_line)" stroke-width="1" marker-end="url(#seq-arrow)" />
  <text x="430" y="160" font-size="11" text-anchor="middle" font-weight="400" fill="var(--_text-muted)" dy="3.8499999999999996">astream_events()</text>
</g>
<g class="message" data-from="Graph" data-to="LLM" data-label="토큰 생성 요청" data-line-style="solid" data-arrow-head="filled" data-self="false">
  <line x1="500" y1="210" x2="640" y2="210" stroke="var(--_line)" stroke-width="1" marker-end="url(#seq-arrow)" />
  <text x="570" y="200" font-size="11" text-anchor="middle" font-weight="400" fill="var(--_text-muted)" dy="3.8499999999999996">토큰 생성 요청</text>
</g>
<g class="message" data-from="LLM" data-to="Graph" data-label="토큰" data-line-style="dashed" data-arrow-head="filled" data-self="false">
  <line x1="640" y1="278" x2="500" y2="278" stroke="var(--_line)" stroke-width="1" stroke-dasharray="6 4" marker-end="url(#seq-arrow)" />
  <text x="570" y="268" font-size="11" text-anchor="middle" font-weight="400" fill="var(--_text-muted)" dy="3.8499999999999996">토큰</text>
</g>
<g class="message" data-from="Graph" data-to="API" data-label="SSE event" data-line-style="dashed" data-arrow-head="filled" data-self="false">
  <line x1="500" y1="318" x2="360" y2="318" stroke="var(--_line)" stroke-width="1" stroke-dasharray="6 4" marker-end="url(#seq-arrow)" />
  <text x="430" y="308" font-size="11" text-anchor="middle" font-weight="400" fill="var(--_text-muted)" dy="3.8499999999999996">SSE event</text>
</g>
<g class="message" data-from="API" data-to="UI" data-label="StreamingResponse" data-line-style="dashed" data-arrow-head="filled" data-self="false">
  <line x1="360" y1="358" x2="220" y2="358" stroke="var(--_line)" stroke-width="1" stroke-dasharray="6 4" marker-end="url(#seq-arrow)" />
  <text x="290" y="348" font-size="11" text-anchor="middle" font-weight="400" fill="var(--_text-muted)" dy="3.8499999999999996">StreamingResponse</text>
</g>
<g class="message" data-from="UI" data-to="User" data-label="실시간 표시" data-line-style="dashed" data-arrow-head="filled" data-self="false">
  <line x1="220" y1="398" x2="80" y2="398" stroke="var(--_line)" stroke-width="1" stroke-dasharray="6 4" marker-end="url(#seq-arrow)" />
  <text x="150" y="388" font-size="11" text-anchor="middle" font-weight="400" fill="var(--_text-muted)" dy="3.8499999999999996">실시간 표시</text>
</g>
<g class="actor" data-id="User" data-label="사용자" data-type="participant">
  <rect x="40" y="30" width="80" height="40" rx="4" ry="4" fill="var(--_node-fill)" stroke="var(--_node-stroke)" stroke-width="1" />
  <text x="80" y="50" font-size="13" text-anchor="middle" font-weight="500" fill="var(--_text)" dy="4.55">사용자</text>
</g>
<g class="actor" data-id="UI" data-label="Gradio UI" data-type="participant">
  <rect x="175.9785" y="30" width="88.043" height="40" rx="4" ry="4" fill="var(--_node-fill)" stroke="var(--_node-stroke)" stroke-width="1" />
  <text x="220" y="50" font-size="13" text-anchor="middle" font-weight="500" fill="var(--_text)" dy="4.55">Gradio UI</text>
</g>
<g class="actor" data-id="API" data-label="FastAPI" data-type="participant">
  <rect x="319.313" y="30" width="81.374" height="40" rx="4" ry="4" fill="var(--_node-fill)" stroke="var(--_node-stroke)" stroke-width="1" />
  <text x="360" y="50" font-size="13" text-anchor="middle" font-weight="500" fill="var(--_text)" dy="4.55">FastAPI</text>
</g>
<g class="actor" data-id="Graph" data-label="LangGraph" data-type="participant">
  <rect x="448.939" y="30" width="102.122" height="40" rx="4" ry="4" fill="var(--_node-fill)" stroke="var(--_node-stroke)" stroke-width="1" />
  <text x="500" y="50" font-size="13" text-anchor="middle" font-weight="500" fill="var(--_text)" dy="4.55">LangGraph</text>
</g>
<g class="actor" data-id="LLM" data-label="Solar LLM" data-type="participant">
  <rect x="591.162" y="30" width="97.676" height="40" rx="4" ry="4" fill="var(--_node-fill)" stroke="var(--_node-stroke)" stroke-width="1" />
  <text x="640" y="50" font-size="13" text-anchor="middle" font-weight="500" fill="var(--_text)" dy="4.55">Solar LLM</text>
</g>
</svg>
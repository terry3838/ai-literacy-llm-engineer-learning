<polyline class="edge" data-from="B" data-to="C" data-style="solid" data-arrow-start="false" data-arrow-end="true" points="331.956,112.989 379.956,112.989" fill="none" stroke="var(--_line)" stroke-width="1" marker-end="url(#arrowhead)" />

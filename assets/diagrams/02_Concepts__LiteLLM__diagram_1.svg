  <text x="94.52349999999998" y="219.95000000000002" text-anchor="middle" font-size="11" font-weight="400" fill="var(--_text-sec)" dy="3.8499999999999996">Primary</text>
</g>
<g class="edge-label" data-from="Router" data-to="Gemini" data-label="Fallback">
  <rect x="209.48149999999998" y="221.40000000000003" width="59.230000000000004" height="30.3" rx="2" ry="2" fill="var(--bg)" stroke="var(--_inner-stroke)" stroke-width="1" />
  <text x="239.0965" y="236.55000000000004" text-anchor="middle" font-size="11" font-weight="400" fill="var(--_text-sec)" dy="3.8499999999999996">Fallback</text>
</g>
<g class="edge-label" data-from="Router" data-to="Router" data-label="Retry">
  <rect x="120.0375" y="128.2" width="43.786" height="30.3" rx="2" ry="2" fill="var(--bg)" stroke="var(--_inner-stroke)" stroke-width="1" />

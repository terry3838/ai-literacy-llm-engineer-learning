  <rect x="40" y="286.40000000000003" width="109.381" height="36.900000000000006" rx="0" ry="0" fill="var(--_node-fill)" stroke="var(--_node-stroke)" stroke-width="0.75" />
  <text x="94.6905" y="304.85" text-anchor="middle" font-size="13" font-weight="500" fill="var(--_text)" dy="4.55">Solar Solar</text>
</g>
<g class="node" data-id="Gemini" data-label="Google Gemini" data-shape="rectangle">
  <rect x="177.38099999999997" y="286.40000000000003" width="124.20100000000001" height="36.900000000000006" rx="0" ry="0" fill="var(--_node-fill)" stroke="var(--_node-stroke)" stroke-width="0.75" />
  <text x="239.48149999999998" y="304.85" text-anchor="middle" font-size="13" font-weight="500" fill="var(--_text)" dy="4.55">Google Gemini</text>

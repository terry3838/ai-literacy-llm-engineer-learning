<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 294.025 230" width="294.025" height="230" style="--bg:#ffffff;--fg:#1f2328;--line:#d1d9e0;--accent:#0969da;--muted:#59636e">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap');
  text { font-family: 'Inter', system-ui, sans-serif; }
  svg {
    /* Derived from --bg and --fg (overridable via --line, --accent, etc.) */
    --_text:          var(--fg);
    --_text-sec:      var(--muted, color-mix(in srgb, var(--fg) 60%, var(--bg)));
    --_text-muted:    var(--muted, color-mix(in srgb, var(--fg) 40%, var(--bg)));
    --_text-faint:    color-mix(in srgb, var(--fg) 25%, var(--bg));
    --_line:          var(--line, color-mix(in srgb, var(--fg) 50%, var(--bg)));
    --_arrow:         var(--accent, color-mix(in srgb, var(--fg) 85%, var(--bg)));
    --_node-fill:     var(--surface, color-mix(in srgb, var(--fg) 3%, var(--bg)));
    --_node-stroke:   var(--border, color-mix(in srgb, var(--fg) 20%, var(--bg)));
    --_group-fill:    var(--bg);
    --_group-hdr:     color-mix(in srgb, var(--fg) 5%, var(--bg));
    --_inner-stroke:  color-mix(in srgb, var(--fg) 12%, var(--bg));
    --_key-badge:     color-mix(in srgb, var(--fg) 10%, var(--bg));
  }
</style>
<defs>
  <marker id="seq-arrow" markerWidth="8" markerHeight="5" refX="8" refY="2.5" orient="auto-start-reverse">
    <polygon points="0 0, 8 2.5, 0 5" fill="var(--_arrow)" />
  </marker>
  <marker id="seq-arrow-open" markerWidth="8" markerHeight="5" refX="8" refY="2.5" orient="auto-start-reverse">
    <polyline points="0 0, 8 2.5, 0 5" fill="none" stroke="var(--_arrow)" stroke-width="1" />
  </marker>
</defs>
<line class="lifeline" data-actor="C" x1="84.025" y1="70" x2="84.025" y2="200" stroke="var(--_line)" stroke-width="0.75" stroke-dasharray="6 4" />
<line class="lifeline" data-actor="S" x1="224.025" y1="70" x2="224.025" y2="200" stroke="var(--_line)" stroke-width="0.75" stroke-dasharray="6 4" />
<g class="message" data-from="C" data-to="S" data-label="GET /api/items HTTP/1.1" data-line-style="solid" data-arrow-head="filled" data-self="false">
  <line x1="84.025" y1="90" x2="224.025" y2="90" stroke="var(--_line)" stroke-width="1" marker-end="url(#seq-arrow)" />
  <text x="154.025" y="80" font-size="11" text-anchor="middle" font-weight="400" fill="var(--_text-muted)" dy="3.8499999999999996">GET /api/items HTTP/1.1</text>
</g>
<g class="message" data-from="S" data-to="C" data-label="200 OK" data-line-style="solid" data-arrow-head="filled" data-self="false">
  <line x1="224.025" y1="145" x2="84.025" y2="145" stroke="var(--_line)" stroke-width="1" marker-end="url(#seq-arrow)" />
  <text x="154.025" y="135" font-size="11" text-anchor="middle" font-weight="400" fill="var(--_text-muted)" dy="3.8499999999999996">200 OK</text>
</g>
<g class="note" data-position="over" data-actors="C,S">
  <polygon points="61.900999999999996,98 240.149,98 246.149,104 246.149,121 61.900999999999996,121" fill="var(--bg)" stroke="var(--_node-stroke)" stroke-width="0.75" />
  <polygon points="240.149,98 246.149,104 240.149,104" fill="var(--_inner-stroke)" stroke="var(--_node-stroke)" stroke-width="0.75" />
  <text x="154.025" y="109.5" font-size="11" text-anchor="middle" font-weight="400" fill="var(--_text-muted)" dy="3.8499999999999996">헤더: Authorization, Content-Type</text>
</g>
<g class="note" data-position="over" data-actors="C,S">
  <polygon points="100.80799999999999,153 201.24200000000002,153 207.24200000000002,159 207.24200000000002,176 100.80799999999999,176" fill="var(--bg)" stroke="var(--_node-stroke)" stroke-width="0.75" />
  <polygon points="201.24200000000002,153 207.24200000000002,159 201.24200000000002,159" fill="var(--_inner-stroke)" stroke="var(--_node-stroke)" stroke-width="0.75" />
  <text x="154.025" y="164.5" font-size="11" text-anchor="middle" font-weight="400" fill="var(--_text-muted)" dy="3.8499999999999996">바디: {&quot;items&quot;: [...]}</text>
</g>
<g class="actor" data-id="C" data-label="클라이언트" data-type="participant">
  <rect x="30.000000000000007" y="30" width="108.05" height="40" rx="4" ry="4" fill="var(--_node-fill)" stroke="var(--_node-stroke)" stroke-width="1" />
  <text x="84.025" y="50" font-size="13" text-anchor="middle" font-weight="500" fill="var(--_text)" dy="4.55">클라이언트</text>
</g>
<g class="actor" data-id="S" data-label="서버" data-type="participant">
  <rect x="184.025" y="30" width="80" height="40" rx="4" ry="4" fill="var(--_node-fill)" stroke="var(--_node-stroke)" stroke-width="1" />
  <text x="224.025" y="50" font-size="13" text-anchor="middle" font-weight="500" fill="var(--_text)" dy="4.55">서버</text>
</g>
</svg>
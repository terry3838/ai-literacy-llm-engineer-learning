  <rect x="852.8400000000001" y="72.45" width="103.453" height="36.900000000000006" rx="0" ry="0" fill="var(--_node-fill)" stroke="var(--_node-stroke)" stroke-width="0.75" />
  <text x="904.5665000000001" y="90.9" text-anchor="middle" font-size="13" font-weight="500" fill="var(--_text)" dy="4.55">헬스 체크</text>
</g>
<g class="node" data-id="G" data-label="배포 완료" data-shape="rectangle">
  <rect x="1077.9810000000002" y="40" width="103.453" height="36.900000000000006" rx="0" ry="0" fill="var(--_node-fill)" stroke="var(--_node-stroke)" stroke-width="0.75" />
  <text x="1129.7075000000002" y="58.45" text-anchor="middle" font-size="13" font-weight="500" fill="var(--_text)" dy="4.55">배포 완료</text>
</g>
<g class="node" data-id="H" data-label="롤백" data-shape="rectangle">
  <rect x="1077.9810000000002" y="104.9" width="71.59" height="36.900000000000006" rx="0" ry="0" fill="var(--_node-fill)" stroke="var(--_node-stroke)" stroke-width="0.75" />
  <text x="1113.7760000000003" y="123.35000000000001" text-anchor="middle" font-size="13" font-weight="500" fill="var(--_text)" dy="4.55">롤백</text>
</g>
</svg>
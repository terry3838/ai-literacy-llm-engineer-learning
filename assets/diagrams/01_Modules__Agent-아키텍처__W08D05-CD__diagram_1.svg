  <text x="399.8195" y="90.9" text-anchor="middle" font-size="13" font-weight="500" fill="var(--_text)" dy="4.55">이미지 Push</text>
</g>
<g class="node" data-id="D" data-label="레지스트리" data-shape="rectangle">
  <rect x="507.697" y="72.45" width="116.05" height="36.900000000000006" rx="0" ry="0" fill="var(--_node-fill)" stroke="var(--_node-stroke)" stroke-width="0.75" />
  <text x="565.722" y="90.9" text-anchor="middle" font-size="13" font-weight="500" fill="var(--_text)" dy="4.55">레지스트리</text>

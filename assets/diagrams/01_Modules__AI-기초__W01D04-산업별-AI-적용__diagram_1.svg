  <text x="401.3015" y="58.45" text-anchor="middle" font-size="13" font-weight="500" fill="var(--_text)" dy="4.55">디지털 트윈</text>
</g>
<g class="node" data-id="D" data-label="제어/운영" data-shape="rectangle">
  <rect x="508.438" y="68.725" width="104.93499999999999" height="36.900000000000006" rx="0" ry="0" fill="var(--_node-fill)" stroke="var(--_node-stroke)" stroke-width="0.75" />
  <text x="560.9055" y="87.175" text-anchor="middle" font-size="13" font-weight="500" fill="var(--_text)" dy="4.55">제어/운영</text>
</g>
<g class="node" data-id="E" data-label="통합 플랫폼" data-shape="rectangle">
  <rect x="661.3729999999999" y="68.725" width="118.273" height="36.900000000000006" rx="0" ry="0" fill="var(--_node-fill)" stroke="var(--_node-stroke)" stroke-width="0.75" />
  <text x="720.5094999999999" y="87.175" text-anchor="middle" font-size="13" font-weight="500" fill="var(--_text)" dy="4.55">통합 플랫폼</text>
</g>
</svg>
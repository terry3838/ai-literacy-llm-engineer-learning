<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 476.952 420" width="476.952" height="420" style="--bg:#ffffff;--fg:#1f2328;--line:#d1d9e0;--accent:#0969da;--muted:#59636e">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap');
  text { font-family: 'Inter', system-ui, sans-serif; }
  svg {
    /* Derived from --bg and --fg (overridable via --line, --accent, etc.) */
    --_text:          var(--fg);
    --_text-sec:      var(--muted, color-mix(in srgb, var(--fg) 60%, var(--bg)));
    --_text-muted:    var(--muted, color-mix(in srgb, var(--fg) 40%, var(--bg)));
    --_text-faint:    color-mix(in srgb, var(--fg) 25%, var(--bg));
    --_line:          var(--line, color-mix(in srgb, var(--fg) 50%, var(--bg)));
    --_arrow:         var(--accent, color-mix(in srgb, var(--fg) 85%, var(--bg)));
    --_node-fill:     var(--surface, color-mix(in srgb, var(--fg) 3%, var(--bg)));
    --_node-stroke:   var(--border, color-mix(in srgb, var(--fg) 20%, var(--bg)));
    --_group-fill:    var(--bg);
    --_group-hdr:     color-mix(in srgb, var(--fg) 5%, var(--bg));
    --_inner-stroke:  color-mix(in srgb, var(--fg) 12%, var(--bg));
    --_key-badge:     color-mix(in srgb, var(--fg) 10%, var(--bg));
  }
</style>
<defs>
  <marker id="seq-arrow" markerWidth="8" markerHeight="5" refX="8" refY="2.5" orient="auto-start-reverse">
    <polygon points="0 0, 8 2.5, 0 5" fill="var(--_arrow)" />
  </marker>
  <marker id="seq-arrow-open" markerWidth="8" markerHeight="5" refX="8" refY="2.5" orient="auto-start-reverse">
    <polyline points="0 0, 8 2.5, 0 5" fill="none" stroke="var(--_arrow)" stroke-width="1" />
  </marker>
</defs>
<line class="lifeline" data-actor="U" x1="70" y1="70" x2="70" y2="390" stroke="var(--_line)" stroke-width="0.75" stroke-dasharray="6 4" />
<line class="lifeline" data-actor="L" x1="210" y1="70" x2="210" y2="390" stroke="var(--_line)" stroke-width="0.75" stroke-dasharray="6 4" />
<line class="lifeline" data-actor="T" x1="350" y1="70" x2="350" y2="390" stroke="var(--_line)" stroke-width="0.75" stroke-dasharray="6 4" />
<g class="message" data-from="U" data-to="L" data-label="질의" data-line-style="solid" data-arrow-head="filled" data-self="false">
  <line x1="70" y1="90" x2="210" y2="90" stroke="var(--_line)" stroke-width="1" marker-end="url(#seq-arrow)" />
  <text x="140" y="80" font-size="11" text-anchor="middle" font-weight="400" fill="var(--_text-muted)" dy="3.8499999999999996">질의</text>
</g>
<g class="message" data-from="L" data-to="L" data-label="도구 필요 판단" data-line-style="solid" data-arrow-head="filled" data-self="true">
  <polyline points="210,130 240,130 240,150 210,150" fill="none" stroke="var(--_line)" stroke-width="1" marker-end="url(#seq-arrow)" />
  <text x="248" y="140" font-size="11" text-anchor="start" font-weight="400" fill="var(--_text-muted)" dy="3.8499999999999996">도구 필요 판단</text>
</g>
<g class="message" data-from="L" data-to="T" data-label="도구 호출 (JSON)" data-line-style="solid" data-arrow-head="filled" data-self="false">
  <line x1="210" y1="200" x2="350" y2="200" stroke="var(--_line)" stroke-width="1" marker-end="url(#seq-arrow)" />
  <text x="280" y="190" font-size="11" text-anchor="middle" font-weight="400" fill="var(--_text-muted)" dy="3.8499999999999996">도구 호출 (JSON)</text>
</g>
<g class="message" data-from="T" data-to="T" data-label="함수 실행" data-line-style="solid" data-arrow-head="filled" data-self="true">
  <polyline points="350,240 380,240 380,260 350,260" fill="none" stroke="var(--_line)" stroke-width="1" marker-end="url(#seq-arrow)" />
  <text x="388" y="250" font-size="11" text-anchor="start" font-weight="400" fill="var(--_text-muted)" dy="3.8499999999999996">함수 실행</text>
</g>
<g class="message" data-from="T" data-to="L" data-label="실행 결과" data-line-style="solid" data-arrow-head="filled" data-self="false">
  <line x1="350" y1="310" x2="210" y2="310" stroke="var(--_line)" stroke-width="1" marker-end="url(#seq-arrow)" />
  <text x="280" y="300" font-size="11" text-anchor="middle" font-weight="400" fill="var(--_text-muted)" dy="3.8499999999999996">실행 결과</text>
</g>
<g class="message" data-from="L" data-to="U" data-label="최종 응답" data-line-style="solid" data-arrow-head="filled" data-self="false">
  <line x1="210" y1="350" x2="70" y2="350" stroke="var(--_line)" stroke-width="1" marker-end="url(#seq-arrow)" />
  <text x="140" y="340" font-size="11" text-anchor="middle" font-weight="400" fill="var(--_text-muted)" dy="3.8499999999999996">최종 응답</text>
</g>
<g class="actor" data-id="U" data-label="사용자" data-type="participant">
  <rect x="30" y="30" width="80" height="40" rx="4" ry="4" fill="var(--_node-fill)" stroke="var(--_node-stroke)" stroke-width="1" />
  <text x="70" y="50" font-size="13" text-anchor="middle" font-weight="500" fill="var(--_text)" dy="4.55">사용자</text>
</g>
<g class="actor" data-id="L" data-label="LLM" data-type="participant">
  <rect x="170" y="30" width="80" height="40" rx="4" ry="4" fill="var(--_node-fill)" stroke="var(--_node-stroke)" stroke-width="1" />
  <text x="210" y="50" font-size="13" text-anchor="middle" font-weight="500" fill="var(--_text)" dy="4.55">LLM</text>
</g>
<g class="actor" data-id="T" data-label="도구" data-type="participant">
  <rect x="310" y="30" width="80" height="40" rx="4" ry="4" fill="var(--_node-fill)" stroke="var(--_node-stroke)" stroke-width="1" />
  <text x="350" y="50" font-size="13" text-anchor="middle" font-weight="500" fill="var(--_text)" dy="4.55">도구</text>
</g>
</svg>
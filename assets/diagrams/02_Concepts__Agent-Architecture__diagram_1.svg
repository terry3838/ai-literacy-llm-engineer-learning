  <text x="310.1315" y="168.70000000000002" text-anchor="middle" font-size="13" font-weight="500" fill="var(--_text)"><tspan x="310.1315" dy="-3.9000000000000012">Observe</tspan><tspan x="310.1315" dy="16.900000000000002">결과 관찰</tspan></text>
</g>

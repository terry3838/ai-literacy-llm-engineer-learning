<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 658.906 116.9" width="658.906" height="116.9" style="--bg:#ffffff;--fg:#1f2328;--line:#d1d9e0;--accent:#0969da;--muted:#59636e">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap');
  text { font-family: 'Inter', system-ui, sans-serif; }
  svg {
    /* Derived from --bg and --fg (overridable via --line, --accent, etc.) */
    --_text:          var(--fg);
    --_text-sec:      var(--muted, color-mix(in srgb, var(--fg) 60%, var(--bg)));
    --_text-muted:    var(--muted, color-mix(in srgb, var(--fg) 40%, var(--bg)));
    --_text-faint:    color-mix(in srgb, var(--fg) 25%, var(--bg));
    --_line:          var(--line, color-mix(in srgb, var(--fg) 50%, var(--bg)));
    --_arrow:         var(--accent, color-mix(in srgb, var(--fg) 85%, var(--bg)));
    --_node-fill:     var(--surface, color-mix(in srgb, var(--fg) 3%, var(--bg)));
    --_node-stroke:   var(--border, color-mix(in srgb, var(--fg) 20%, var(--bg)));
    --_group-fill:    var(--bg);
    --_group-hdr:     color-mix(in srgb, var(--fg) 5%, var(--bg));
    --_inner-stroke:  color-mix(in srgb, var(--fg) 12%, var(--bg));
    --_key-badge:     color-mix(in srgb, var(--fg) 10%, var(--bg));
  }
</style>
<defs>
  <marker id="arrowhead" markerWidth="8" markerHeight="5" refX="7" refY="2.5" orient="auto">
    <polygon points="0 0, 8 2.5, 0 5" fill="var(--_arrow)" stroke="var(--_arrow)" stroke-width="0.75" stroke-linejoin="round" />
  </marker>
  <marker id="arrowhead-start" markerWidth="8" markerHeight="5" refX="1" refY="2.5" orient="auto-start-reverse">
    <polygon points="8 0, 0 2.5, 8 5" fill="var(--_arrow)" stroke="var(--_arrow)" stroke-width="0.75" stroke-linejoin="round" />
  </marker>
</defs>
<polyline class="edge" data-from="EN" data-to="A" data-style="solid" data-arrow-start="false" data-arrow-end="true" points="143.453,58.45 191.453,58.45" fill="none" stroke="var(--_line)" stroke-width="1" marker-end="url(#arrowhead)" />
<polyline class="edge" data-from="A" data-to="B" data-style="solid" data-arrow-start="false" data-arrow-end="true" points="251.453,58.45 299.453,58.45" fill="none" stroke="var(--_line)" stroke-width="1" marker-end="url(#arrowhead)" />
<polyline class="edge" data-from="B" data-to="C" data-style="solid" data-arrow-start="false" data-arrow-end="true" points="359.453,58.45 407.453,58.45" fill="none" stroke="var(--_line)" stroke-width="1" marker-end="url(#arrowhead)" />
<polyline class="edge" data-from="C" data-to="DE" data-style="solid" data-arrow-start="false" data-arrow-end="true" points="467.453,58.45 515.453,58.45" fill="none" stroke="var(--_line)" stroke-width="1" marker-end="url(#arrowhead)" />
<g class="node" data-id="EN" data-label="enqueue →" data-shape="rectangle">
  <rect x="40" y="40" width="103.453" height="36.900000000000006" rx="0" ry="0" fill="var(--_node-fill)" stroke="var(--_node-stroke)" stroke-width="0.75" />
  <text x="91.7265" y="58.45" text-anchor="middle" font-size="13" font-weight="500" fill="var(--_text)" dy="4.55">enqueue →</text>
</g>
<g class="node" data-id="A" data-label="&quot;[A" data-shape="rectangle">
  <rect x="191.453" y="40" width="60" height="36.900000000000006" rx="0" ry="0" fill="#4CAF50" stroke="var(--_node-stroke)" stroke-width="0.75" />
  <text x="221.453" y="58.45" text-anchor="middle" font-size="13" font-weight="500" fill="#fff" dy="4.55">&quot;[A</text>
</g>
<g class="node" data-id="B" data-label="&quot;[B" data-shape="rectangle">
  <rect x="299.453" y="40" width="60" height="36.900000000000006" rx="0" ry="0" fill="var(--_node-fill)" stroke="var(--_node-stroke)" stroke-width="0.75" />
  <text x="329.453" y="58.45" text-anchor="middle" font-size="13" font-weight="500" fill="var(--_text)" dy="4.55">&quot;[B</text>
</g>
<g class="node" data-id="C" data-label="&quot;[C" data-shape="rectangle">
  <rect x="407.453" y="40" width="60" height="36.900000000000006" rx="0" ry="0" fill="#2196F3" stroke="var(--_node-stroke)" stroke-width="0.75" />
  <text x="437.453" y="58.45" text-anchor="middle" font-size="13" font-weight="500" fill="#fff" dy="4.55">&quot;[C</text>
</g>
<g class="node" data-id="DE" data-label="→ dequeue" data-shape="rectangle">
  <rect x="515.453" y="40" width="103.453" height="36.900000000000006" rx="0" ry="0" fill="var(--_node-fill)" stroke="var(--_node-stroke)" stroke-width="0.75" />
  <text x="567.1795" y="58.45" text-anchor="middle" font-size="13" font-weight="500" fill="var(--_text)" dy="4.55">→ dequeue</text>
</g>
</svg>
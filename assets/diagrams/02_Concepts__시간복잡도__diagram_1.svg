  <rect x="683.1510000000001" y="40" width="73.072" height="53.800000000000004" rx="0" ry="0" fill="#9C27B0" stroke="var(--_node-stroke)" stroke-width="0.75" />
  <text x="719.6870000000001" y="66.9" text-anchor="middle" font-size="13" font-weight="500" fill="#fff"><tspan x="719.6870000000001" dy="-3.9000000000000012">O(2ⁿ)</tspan><tspan x="719.6870000000001" dy="16.900000000000002">지수</tspan></text>
</g>
</svg>
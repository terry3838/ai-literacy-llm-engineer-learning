  <text x="463.464" y="66.9" text-anchor="middle" font-size="13" font-weight="500" fill="#fff"><tspan x="463.464" dy="-3.9000000000000012">O(n log n)</tspan><tspan x="463.464" dy="16.900000000000002">선형로그</tspan></text>
</g>

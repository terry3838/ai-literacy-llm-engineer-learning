  <text x="202.4245" y="66.9" text-anchor="middle" font-size="13" font-weight="500" fill="#fff"><tspan x="202.4245" dy="-3.9000000000000012">O(log n)</tspan><tspan x="202.4245" dy="16.900000000000002">로그</tspan></text>
</g>
<g class="node" data-id="ON" data-label="O(n)

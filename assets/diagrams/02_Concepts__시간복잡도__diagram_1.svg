<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 796.223 133.8" width="796.223" height="133.8" style="--bg:#ffffff;--fg:#1f2328;--line:#d1d9e0;--accent:#0969da;--muted:#59636e">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap');
  text { font-family: 'Inter', system-ui, sans-serif; }
  svg {
    /* Derived from --bg and --fg (overridable via --line, --accent, etc.) */
    --_text:          var(--fg);
    --_text-sec:      var(--muted, color-mix(in srgb, var(--fg) 60%, var(--bg)));
    --_text-muted:    var(--muted, color-mix(in srgb, var(--fg) 40%, var(--bg)));
    --_text-faint:    color-mix(in srgb, var(--fg) 25%, var(--bg));
    --_line:          var(--line, color-mix(in srgb, var(--fg) 50%, var(--bg)));
    --_arrow:         var(--accent, color-mix(in srgb, var(--fg) 85%, var(--bg)));
    --_node-fill:     var(--surface, color-mix(in srgb, var(--fg) 3%, var(--bg)));
    --_node-stroke:   var(--border, color-mix(in srgb, var(--fg) 20%, var(--bg)));
    --_group-fill:    var(--bg);
    --_group-hdr:     color-mix(in srgb, var(--fg) 5%, var(--bg));
    --_inner-stroke:  color-mix(in srgb, var(--fg) 12%, var(--bg));
    --_key-badge:     color-mix(in srgb, var(--fg) 10%, var(--bg));
  }
</style>
<defs>
  <marker id="arrowhead" markerWidth="8" markerHeight="5" refX="7" refY="2.5" orient="auto">
    <polygon points="0 0, 8 2.5, 0 5" fill="var(--_arrow)" stroke="var(--_arrow)" stroke-width="0.75" stroke-linejoin="round" />
  </marker>
  <marker id="arrowhead-start" markerWidth="8" markerHeight="5" refX="1" refY="2.5" orient="auto-start-reverse">
    <polygon points="8 0, 0 2.5, 8 5" fill="var(--_arrow)" stroke="var(--_arrow)" stroke-width="0.75" stroke-linejoin="round" />
  </marker>
</defs>
<polyline class="edge" data-from="O1" data-to="OL" data-style="solid" data-arrow-start="false" data-arrow-end="true" points="111.59,66.9 159.59,66.9" fill="none" stroke="var(--_line)" stroke-width="1" marker-end="url(#arrowhead)" />
<polyline class="edge" data-from="OL" data-to="ON" data-style="solid" data-arrow-start="false" data-arrow-end="true" points="245.259,66.9 293.259,66.9" fill="none" stroke="var(--_line)" stroke-width="1" marker-end="url(#arrowhead)" />
<polyline class="edge" data-from="ON" data-to="ONL" data-style="solid" data-arrow-start="false" data-arrow-end="true" points="364.849,66.9 412.849,66.9" fill="none" stroke="var(--_line)" stroke-width="1" marker-end="url(#arrowhead)" />
<polyline class="edge" data-from="ONL" data-to="ON2" data-style="solid" data-arrow-start="false" data-arrow-end="true" points="514.079,66.9 562.079,66.9" fill="none" stroke="var(--_line)" stroke-width="1" marker-end="url(#arrowhead)" />
<polyline class="edge" data-from="ON2" data-to="O2N" data-style="solid" data-arrow-start="false" data-arrow-end="true" points="635.1510000000001,66.9 683.1510000000001,66.9" fill="none" stroke="var(--_line)" stroke-width="1" marker-end="url(#arrowhead)" />
<g class="node" data-id="O1" data-label="O(1)
상수" data-shape="rectangle">
  <rect x="40" y="40" width="71.59" height="53.800000000000004" rx="0" ry="0" fill="#4CAF50" stroke="var(--_node-stroke)" stroke-width="0.75" />
  <text x="75.795" y="66.9" text-anchor="middle" font-size="13" font-weight="500" fill="#fff"><tspan x="75.795" dy="-3.9000000000000012">O(1)</tspan><tspan x="75.795" dy="16.900000000000002">상수</tspan></text>
</g>

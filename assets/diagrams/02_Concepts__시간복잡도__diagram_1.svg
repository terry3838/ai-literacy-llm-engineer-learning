  <rect x="562.079" y="40" width="73.072" height="53.800000000000004" rx="0" ry="0" fill="#f44336" stroke="var(--_node-stroke)" stroke-width="0.75" />
  <text x="598.615" y="66.9" text-anchor="middle" font-size="13" font-weight="500" fill="#fff"><tspan x="598.615" dy="-3.9000000000000012">O(n²)</tspan><tspan x="598.615" dy="16.900000000000002">이차</tspan></text>
</g>
<g class="node" data-id="O2N" data-label="O(2ⁿ)
